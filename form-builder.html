<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Builder — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>

    /* ════════════════════════════════════════════════════════
       LAYOUT  — 2-col: palette | canvas
       Properties always open in a right-side DRAWER
    ════════════════════════════════════════════════════════ */
    .builder-wrap {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 14px;
      height: calc(100vh - 150px);
      min-height: 500px;
    }

    /* ── Panels ─────────────────────────────────────────── */
    .b-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .b-panel-head {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border-color);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    .b-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    /* ── Palette items ──────────────────────────────────── */
    .pal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: var(--body-bg);
      transition: background .15s, border-color .15s, color .15s;
      user-select: none;
    }
    .pal-item:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .pal-item i     { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

    /* ── Canvas drop zone ───────────────────────────────── */
    .canvas-empty {
      border: 2px dashed var(--border-color);
      border-radius: 10px;
      padding: 52px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13.5px;
      transition: border-color .18s, background .18s;
    }
    .canvas-empty.over { border-color: var(--primary); background: var(--primary-light); }
    #cards-wrap        { min-height: 10px; }

    /* ── Field card ─────────────────────────────────────── */
    .f-card {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 11px 10px 11px 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
    }
    .f-card:hover    { border-color: #93c5fd; }
    .f-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.13); }

    /* drag grip — ONLY this starts sortable drag */
    .f-grip {
      cursor: grab;
      color: var(--text-muted);
      font-size: 17px;
      padding: 2px 5px 2px 2px;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .f-grip:active { cursor: grabbing; }

    .f-body   { flex: 1; min-width: 0; }
    .f-label  {
      font-weight: 600;
      font-size: 13.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .f-type-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 2px 7px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 4px;
    }
    .f-req-star  { color: #ef4444; font-weight: 700; }
    .f-help-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .f-actions {
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .f-card:hover .f-actions { opacity: 1; }

    .f-preview               { pointer-events: none; }
    .f-preview .form-control,
    .f-preview .form-select  { font-size: 12.5px; padding: 5px 10px; }

    /* ── Edit hint badge on card ────────────────────────── */
    .f-edit-hint {
      position: absolute;
      top: 8px; right: 42px;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .f-card:hover .f-edit-hint { opacity: 1; }

    /* ════════════════════════════════════════════════════════
       PROPERTIES DRAWER
       — slides in from the right over the page
       — always visible regardless of screen width
    ════════════════════════════════════════════════════════ */
    #props-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 360px;
      max-width: 100vw;
      background: var(--card-bg);
      border-left: 1px solid var(--border-color);
      box-shadow: -6px 0 32px rgba(0,0,0,.12);
      z-index: 1050;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    #props-drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .drawer-head-title { font-weight: 700; font-size: 14px; flex: 1; }
    .drawer-close {
      width: 30px; height: 30px;
      border: none;
      background: var(--body-bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      transition: background .15s;
    }
    .drawer-close:hover { background: var(--border-color); color: var(--text-primary); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* Drawer overlay (dim background) */
    #props-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.25);
      z-index: 1049;
      display: none;
      backdrop-filter: blur(1px);
    }
    #props-overlay.show { display: block; }

    /* ── Drawer sections ────────────────────────────────── */
    .d-sec {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .d-sec:last-child { border-bottom: none; }
    .d-sec-title {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── Choices list ───────────────────────────────────── */
    .opt-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .opt-grip {
      cursor: grab;
      color: var(--text-muted);
      font-size: 15px;
      padding: 0 3px;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── Apply button bar ───────────────────────────────── */
    .drawer-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: var(--card-bg);
    }

    /* field count badge */
    #field-count {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 600;
    }

    @media(max-width:600px) {
      .builder-wrap { grid-template-columns: 1fr; }
      #palette-panel { display: none; }
      #props-drawer  { width: 100vw; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>

    <div class="page-content" style="padding-top:14px">

      <!-- ── Toolbar ──────────────────────────────────── -->
      <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
        <input type="text" id="form-title-input" class="form-control"
               placeholder="Untitled Form"
               style="max-width:300px;font-weight:600;font-size:15px">
        <input type="text" id="form-desc-input" class="form-control"
               placeholder="Form description (optional)"
               style="max-width:280px;font-size:13px">
        <div class="ms-auto d-flex gap-2 flex-wrap">
          <button class="btn btn-light btn-sm"          onclick="previewForm()">   <i class="bi bi-eye me-1"></i>Preview</button>
          <button class="btn btn-outline-primary btn-sm" onclick="saveForm(false)"><i class="bi bi-floppy me-1"></i>Save Draft</button>
          <button class="btn btn-success btn-sm"         onclick="saveForm(true)"> <i class="bi bi-globe2 me-1"></i>Publish</button>
        </div>
      </div>

      <!-- ── 2-col layout: palette | canvas ───────────── -->
      <div class="builder-wrap">

        <!-- Palette -->
        <div class="b-panel" id="palette-panel">
          <div class="b-panel-head"><i class="bi bi-grid-3x3-gap-fill"></i> Field Types</div>
          <div class="b-panel-body" id="palette-body"></div>
        </div>

        <!-- Canvas -->
        <div class="b-panel">
          <div class="b-panel-head d-flex align-items-center" style="gap:8px">
            <i class="bi bi-layout-text-window-reverse"></i>
            <span>Canvas</span>
            <span id="field-count" class="ms-auto">0 fields</span>
            <span style="font-size:11px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">
              Click a field to edit ✏️
            </span>
          </div>
          <div class="b-panel-body" id="canvas-scroll">
            <div id="canvas-empty" class="canvas-empty">
              <i class="bi bi-plus-circle" style="font-size:2.2rem;opacity:.25;display:block;margin-bottom:12px"></i>
              <div style="font-weight:600;margin-bottom:5px">Drop fields here</div>
              <div style="font-size:12px">Click any field type on the left, or drag it here</div>
            </div>
            <div id="cards-wrap"></div>
          </div>
        </div>

      </div><!-- /builder-wrap -->
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     PROPERTIES DRAWER  — slides in from right on field click
════════════════════════════════════════════════════════ -->
<div id="props-overlay" onclick="closeDrawer()"></div>

<div id="props-drawer">
  <div class="drawer-head">
    <div style="width:30px;height:30px;background:var(--primary-light);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <i class="bi bi-sliders" style="color:var(--primary);font-size:14px"></i>
    </div>
    <div class="drawer-head-title">Edit Field</div>
    <div id="drawer-type-tag" class="f-type-tag">text</div>
    <button class="drawer-close" onclick="closeDrawer()" title="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="drawer-body" id="drawer-body">
    <!-- Filled dynamically -->
  </div>

  <div class="drawer-footer">
    <button class="btn btn-primary flex-grow-1" onclick="applyAndClose()">
      <i class="bi bi-check-lg me-1"></i>Done
    </button>
    <button class="btn btn-light" onclick="closeDrawer()">Cancel</button>
  </div>
</div>

<!-- Preview modal -->
<div class="modal fade" id="preview-modal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-eye me-2"></i>Form Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0" id="preview-body"></div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/rbac.js"></script>
<script src="js/firestore.js"></script>
<script src="components/shell.js"></script>

<script>
'use strict';
initTheme();

/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const TYPES = [
  { type:'text',      label:'Short Text',    icon:'bi-input-cursor-text' },
  { type:'textarea',  label:'Long Text',     icon:'bi-text-paragraph'   },
  { type:'number',    label:'Number',        icon:'bi-123'              },
  { type:'email',     label:'Email',         icon:'bi-envelope'         },
  { type:'phone',     label:'Phone',         icon:'bi-telephone'        },
  { type:'dropdown',  label:'Dropdown',      icon:'bi-menu-button-wide' },
  { type:'radio',     label:'Radio Buttons', icon:'bi-ui-radios'        },
  { type:'checkbox',  label:'Checkboxes',    icon:'bi-check2-square'    },
  { type:'date',      label:'Date Picker',   icon:'bi-calendar-event'   },
  { type:'file',      label:'File Upload',   icon:'bi-cloud-upload'     },
];

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let fields        = [];   // array of field objects
let activeId      = null; // id of field currently open in drawer
let editingFormId = null;

/* ══════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════ */
Auth.requireAdmin(async (user, profile) => {
  const { sidebarHTML, topbarHTML } = renderShell('form-builder');
  document.getElementById('sidebar-mount').innerHTML = sidebarHTML;
  document.getElementById('topbar-mount').innerHTML  = topbarHTML;
  document.getElementById('page-title').textContent  = 'Form Builder';
  Auth.populateTopbar(profile);
  setSidebarUser(profile);

  const params = new URLSearchParams(location.search);
  editingFormId = params.get('id');
  if (editingFormId) {
    const form = await FS.getForm(editingFormId);
    if (form) {
      document.getElementById('form-title-input').value = form.title       || '';
      document.getElementById('form-desc-input').value  = form.description || '';
      fields = (form.fields || []).map(mk);
      renderAll();
    }
  }

  buildPalette();
  initCardSort();
  initDropZone();
});

function setSidebarUser(p) {
  const a=document.getElementById('sidebar-avatar'), n=document.getElementById('sidebar-name'), r=document.getElementById('sidebar-role');
  if(a) a.textContent = (p.name||p.email||'?')[0].toUpperCase();
  if(n) n.textContent = p.name||p.email;
  if(r) r.textContent = cap(p.role);
}

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function cap(s) { return s ? s[0].toUpperCase()+s.slice(1) : ''; }

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hasOpts(type) { return ['dropdown','radio','checkbox'].includes(type); }
function hasPH(type)   { return ['text','textarea','number','email','phone'].includes(type); }

/* Normalize / create a field object */
function mk(src) {
  src = src || {};
  return {
    id:          src.id          || ('f_'+Date.now()+'_'+Math.random().toString(36).slice(2,5)),
    type:        src.type        || 'text',
    label:       src.label       || TYPES.find(t=>t.type===(src.type||'text'))?.label || 'Field',
    placeholder: src.placeholder || '',
    required:    !!src.required,
    helpText:    src.helpText    || '',
    options:     Array.isArray(src.options) ? [...src.options] : []
  };
}

/* ══════════════════════════════════════════════════════════
   PALETTE
══════════════════════════════════════════════════════════ */
function buildPalette() {
  document.getElementById('palette-body').innerHTML = TYPES.map(t => `
    <div class="pal-item" draggable="true"
         data-type="${t.type}"
         ondragstart="onPalDrag(event)"
         onclick="addField('${t.type}')">
      <i class="bi ${t.icon}"></i><span>${t.label}</span>
    </div>`).join('');
}

/* ══════════════════════════════════════════════════════════
   DRAG FROM PALETTE → CANVAS
══════════════════════════════════════════════════════════ */
let dragType = null;
function onPalDrag(e) { dragType = e.currentTarget.dataset.type; e.dataTransfer.effectAllowed='copy'; }

function initDropZone() {
  const scroll = document.getElementById('canvas-scroll');
  const empty  = document.getElementById('canvas-empty');
  scroll.addEventListener('dragover',  e => { e.preventDefault(); empty.classList.add('over'); });
  scroll.addEventListener('dragleave', ()=> empty.classList.remove('over'));
  scroll.addEventListener('drop', e => {
    e.preventDefault(); empty.classList.remove('over');
    if (dragType) { addField(dragType); dragType=null; }
  });
}

/* ══════════════════════════════════════════════════════════
   ADD / DELETE / DUPLICATE
══════════════════════════════════════════════════════════ */
function addField(type) {
  const t = TYPES.find(x=>x.type===type);
  const f = mk({
    type,
    label: t.label,
    placeholder: hasPH(type) ? 'Enter '+t.label.toLowerCase()+'…' : '',
    options: hasOpts(type) ? ['Option 1','Option 2','Option 3'] : []
  });
  fields.push(f);
  document.getElementById('cards-wrap').appendChild(mkCard(f));
  syncEmpty(); syncCount();
  openDrawer(f.id);        // immediately open drawer to edit it
}

function deleteField(id, e) {
  if (e) e.stopPropagation();
  fields = fields.filter(f=>f.id!==id);
  const el = document.querySelector('.f-card[data-id="'+id+'"]');
  if (el) el.remove();
  if (activeId===id) closeDrawer();
  syncEmpty(); syncCount();
  showToast('Field removed.','info');
}

function duplicateField(id, e) {
  if (e) e.stopPropagation();
  const src = fields.find(f=>f.id===id);
  if (!src) return;
  const clone = mk(JSON.parse(JSON.stringify(src)));
  clone.id = 'f_'+Date.now()+'_d';
  const idx = fields.findIndex(f=>f.id===id);
  fields.splice(idx+1, 0, clone);
  const srcEl = document.querySelector('.f-card[data-id="'+id+'"]');
  const newEl = mkCard(clone);
  srcEl ? srcEl.after(newEl) : document.getElementById('cards-wrap').appendChild(newEl);
  syncCount();
  openDrawer(clone.id);    // open drawer for the duplicate
}

/* ══════════════════════════════════════════════════════════
   BUILD CARD ELEMENT
   IMPORTANT: drag handle is ONLY .f-grip
   so clicking anywhere else on the card fires click → openDrawer
══════════════════════════════════════════════════════════ */
function mkCard(f) {
  const div = document.createElement('div');
  div.className  = 'f-card';
  div.dataset.id = f.id;
  div.addEventListener('click', function() { openDrawer(this.dataset.id); });

  div.innerHTML = `
    <div class="f-grip" title="Drag to reorder">⠿</div>
    <div class="f-body">
      <div class="f-label">
        <span class="f-lbl">${esc(f.label)}</span>
        ${f.required ? '<span class="f-req-star">*</span>' : ''}
        <span class="f-type-tag">${f.type}</span>
      </div>
      <div class="f-preview">${mkPreview(f)}</div>
      ${f.helpText ? `<div class="f-help-text">${esc(f.helpText)}</div>` : ''}
    </div>
    <div class="f-edit-hint"><i class="bi bi-pencil me-1"></i>Click to edit</div>
    <div class="f-actions">
      <button class="btn btn-icon btn-sm btn-light" title="Duplicate" onclick="duplicateField('${f.id}',event)">
        <i class="bi bi-copy" style="font-size:11px"></i>
      </button>
      <button class="btn btn-icon btn-sm btn-light text-danger" title="Delete" onclick="deleteField('${f.id}',event)">
        <i class="bi bi-trash" style="font-size:11px"></i>
      </button>
    </div>`;
  return div;
}

/* Full re-render — only on page load */
function renderAll() {
  document.getElementById('cards-wrap').innerHTML = '';
  fields.forEach(f => document.getElementById('cards-wrap').appendChild(mkCard(f)));
  syncEmpty(); syncCount();
}

/* ══════════════════════════════════════════════════════════
   FIELD PREVIEW WIDGET (disabled, display only)
══════════════════════════════════════════════════════════ */
function mkPreview(f) {
  const ph = esc(f.placeholder||'');
  const opts = f.options||[];
  switch(f.type) {
    case 'text':     return `<input type="text"   class="form-control form-control-sm" placeholder="${ph}" disabled>`;
    case 'textarea': return `<textarea             class="form-control form-control-sm" placeholder="${ph}" rows="2" disabled></textarea>`;
    case 'number':   return `<input type="number" class="form-control form-control-sm" placeholder="${ph}" disabled>`;
    case 'email':    return `<input type="email"  class="form-control form-control-sm" placeholder="${ph}" disabled>`;
    case 'phone':    return `<input type="tel"    class="form-control form-control-sm" placeholder="${ph}" disabled>`;
    case 'date':     return `<input type="date"   class="form-control form-control-sm" disabled>`;
    case 'dropdown': return `<select class="form-select form-select-sm" disabled>
                               <option>Select an option…</option>
                               ${opts.map(o=>`<option>${esc(o)}</option>`).join('')}
                             </select>`;
    case 'radio':    return opts.slice(0,4).map(o=>`
                       <div class="form-check">
                         <input type="radio" class="form-check-input" disabled>
                         <label class="form-check-label" style="font-size:12px">${esc(o)}</label>
                       </div>`).join('');
    case 'checkbox': return opts.slice(0,4).map(o=>`
                       <div class="form-check">
                         <input type="checkbox" class="form-check-input" disabled>
                         <label class="form-check-label" style="font-size:12px">${esc(o)}</label>
                       </div>`).join('');
    case 'file':     return `<input type="file" class="form-control form-control-sm" disabled>`;
    default:         return `<input type="text" class="form-control form-control-sm" disabled>`;
  }
}

/* ══════════════════════════════════════════════════════════
   SORTABLE — handle is ONLY .f-grip
══════════════════════════════════════════════════════════ */
function initCardSort() {
  Sortable.create(document.getElementById('cards-wrap'), {
    animation: 160,
    handle: '.f-grip',          // ← only the grip icon starts a drag
    ghostClass: 'sortable-ghost',
    onEnd(evt) {
      if (evt.oldIndex===evt.newIndex) return;
      const [mv] = fields.splice(evt.oldIndex, 1);
      fields.splice(evt.newIndex, 0, mv);
    }
  });
}

/* ══════════════════════════════════════════════════════════
   DRAWER  — open / close / populate
══════════════════════════════════════════════════════════ */
function openDrawer(id) {
  const field = fields.find(f=>f.id===id);
  if (!field) return;
  activeId = id;

  // Highlight the card
  document.querySelectorAll('.f-card').forEach(c=>c.classList.remove('selected'));
  const card = document.querySelector('.f-card[data-id="'+id+'"]');
  if (card) card.classList.add('selected');

  // Set drawer type badge
  document.getElementById('drawer-type-tag').textContent = field.type;

  // Render drawer content
  fillDrawer(field);

  // Show drawer + overlay
  document.getElementById('props-drawer').classList.add('open');
  document.getElementById('props-overlay').classList.add('show');

  // Auto-focus the label input
  setTimeout(()=>{ const l=document.getElementById('d-label'); if(l){l.focus();l.select();} }, 280);
}

function closeDrawer() {
  document.getElementById('props-drawer').classList.remove('open');
  document.getElementById('props-overlay').classList.remove('show');
  document.querySelectorAll('.f-card').forEach(c=>c.classList.remove('selected'));
  activeId = null;
}

function applyAndClose() {
  // Changes are already live via oninput/onchange → just close
  showToast('Field updated ✓','success');
  closeDrawer();
}

/* ══════════════════════════════════════════════════════════
   FILL DRAWER CONTENT FOR A FIELD
   All inputs directly mutate fields[] and patch the card.
   No full re-render ever happens from here.
══════════════════════════════════════════════════════════ */
function fillDrawer(field) {
  const showPH   = hasPH(field.type);
  const showOpts = hasOpts(field.type);

  document.getElementById('drawer-body').innerHTML = `

    <!-- ── Label ─────────────────────────────────────────── -->
    <div class="d-sec">
      <div class="d-sec-title"><i class="bi bi-fonts me-1"></i>Field Label</div>
      <input type="text" class="form-control" id="d-label"
             value="${esc(field.label)}"
             placeholder="e.g. Student Full Name"
             oninput="live('label',this.value)">
      <div class="form-text mt-1">The heading shown above this field in the form</div>
    </div>

    <!-- ── Placeholder ───────────────────────────────────── -->
    ${showPH ? `
    <div class="d-sec">
      <div class="d-sec-title"><i class="bi bi-input-cursor me-1"></i>Placeholder Text</div>
      <input type="text" class="form-control" id="d-ph"
             value="${esc(field.placeholder||'')}"
             placeholder="e.g. Enter your full name…"
             oninput="live('placeholder',this.value)">
      <div class="form-text mt-1">Ghost text shown inside the empty input</div>
    </div>` : ''}

    <!-- ── Required ──────────────────────────────────────── -->
    <div class="d-sec">
      <div class="d-sec-title"><i class="bi bi-asterisk me-1"></i>Validation</div>
      <div class="form-check form-switch" style="padding-left:2.5em">
        <input class="form-check-input" type="checkbox" role="switch"
               id="d-req"
               ${field.required?'checked':''}
               onchange="live('required',this.checked)">
        <label class="form-check-label" for="d-req" style="font-size:14px">
          Mark as required &nbsp;<strong class="text-danger">*</strong>
        </label>
      </div>
      <div class="form-text mt-1">Student must fill this field before submitting</div>
    </div>

    <!-- ── Help Text ─────────────────────────────────────── -->
    <div class="d-sec">
      <div class="d-sec-title"><i class="bi bi-info-circle me-1"></i>Help Text</div>
      <input type="text" class="form-control" id="d-help"
             value="${esc(field.helpText||'')}"
             placeholder="Optional hint shown below the field…"
             oninput="live('helpText',this.value)">
      <div class="form-text mt-1">Small note shown below the input</div>
    </div>

    <!-- ── Choices ───────────────────────────────────────── -->
    ${showOpts ? `
    <div class="d-sec">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="d-sec-title mb-0"><i class="bi bi-list-ul me-1"></i>Choices</div>
        <button class="btn btn-primary btn-sm" onclick="addChoice()"
                style="border-radius:8px;font-size:12px">
          <i class="bi bi-plus-lg me-1"></i>Add Choice
        </button>
      </div>
      <div id="d-choices-list"></div>
      <div class="form-text">Drag <span style="font-size:12px">⠿</span> to reorder choices</div>
    </div>` : ''}

    <!-- ── Field type info ───────────────────────────────── -->
    <div class="d-sec" style="background:var(--body-bg)">
      <div class="d-sec-title"><i class="bi bi-info-circle me-1"></i>Field Info</div>
      <div class="d-flex align-items-center gap-2">
        <span class="f-type-tag" style="font-size:11px">${field.type}</span>
        <span style="font-size:12.5px;color:var(--text-muted)">Field ID: <code style="font-size:11px">${field.id}</code></span>
      </div>
    </div>

    <!-- ── Actions ───────────────────────────────────────── -->
    <div class="d-sec">
      <div class="d-sec-title"><i class="bi bi-gear me-1"></i>Actions</div>
      <div class="d-flex gap-2">
        <button class="btn btn-light btn-sm flex-grow-1" onclick="duplicateField('${field.id}',event);closeDrawer()">
          <i class="bi bi-copy me-1"></i>Duplicate Field
        </button>
        <button class="btn btn-danger btn-sm flex-grow-1" onclick="deleteField('${field.id}',event)">
          <i class="bi bi-trash me-1"></i>Delete Field
        </button>
      </div>
    </div>`;

  if (showOpts) renderChoices();
}

/* ══════════════════════════════════════════════════════════
   live()  — called oninput/onchange from drawer inputs
   Updates fields[] + patches the card in the canvas
   NEVER re-renders anything → zero focus-kill
══════════════════════════════════════════════════════════ */
function live(key, value) {
  const field = fields.find(f=>f.id===activeId);
  if (!field) return;
  field[key] = value;
  patchCard(activeId);
}

/* Surgically update only the changed card's DOM */
function patchCard(id) {
  const field = fields.find(f=>f.id===id);
  if (!field) return;
  const card = document.querySelector('.f-card[data-id="'+id+'"]');
  if (!card) return;

  // Label
  const lblEl = card.querySelector('.f-lbl');
  if (lblEl) lblEl.textContent = field.label;

  // Required star
  const star = card.querySelector('.f-req-star');
  if (field.required && !star) {
    card.querySelector('.f-label').insertAdjacentHTML('beforeend','<span class="f-req-star">*</span>');
  } else if (!field.required && star) {
    star.remove();
  }

  // Preview (placeholder / options)
  const pw = card.querySelector('.f-preview');
  if (pw) pw.innerHTML = mkPreview(field);

  // Help text
  let ht = card.querySelector('.f-help-text');
  if (field.helpText) {
    if (!ht) {
      card.querySelector('.f-body').insertAdjacentHTML('beforeend',
        '<div class="f-help-text"></div>');
      ht = card.querySelector('.f-help-text');
    }
    ht.textContent = field.helpText;
  } else if (ht) {
    ht.remove();
  }
}

/* ══════════════════════════════════════════════════════════
   CHOICES  (dropdown / radio / checkbox)
══════════════════════════════════════════════════════════ */
function renderChoices() {
  const field = fields.find(f=>f.id===activeId);
  const list  = document.getElementById('d-choices-list');
  if (!field||!list) return;

  list.innerHTML = (field.options||[]).map((opt,i)=>`
    <div class="opt-row" data-idx="${i}">
      <span class="opt-grip" title="Drag to reorder">⠿</span>
      <span style="font-size:11px;color:var(--text-muted);width:18px;flex-shrink:0;text-align:right">${i+1}.</span>
      <input type="text" class="form-control flex-grow-1"
             style="font-size:13.5px"
             value="${esc(opt)}"
             placeholder="Choice ${i+1}"
             oninput="setChoice(${i},this.value)">
      <button class="btn btn-icon btn-sm btn-light text-danger"
              onclick="removeChoice(${i})" title="Remove">
        <i class="bi bi-x-lg" style="font-size:10px"></i>
      </button>
    </div>`).join('');

  // Sortable for choices
  if (list._si) list._si.destroy();
  list._si = Sortable.create(list, {
    animation: 120,
    handle: '.opt-grip',
    onEnd(evt) {
      const f = fields.find(x=>x.id===activeId);
      if (!f) return;
      const [mv] = f.options.splice(evt.oldIndex,1);
      f.options.splice(evt.newIndex,0,mv);
      renderChoices();
      patchCard(activeId);
    }
  });
}

/* setChoice — updates data + card only, does NOT re-render choices list → no focus loss */
function setChoice(idx, val) {
  const f = fields.find(f=>f.id===activeId);
  if (!f) return;
  f.options[idx] = val;
  patchCard(activeId);
}

function addChoice() {
  const f = fields.find(f=>f.id===activeId);
  if (!f) return;
  f.options.push('Option '+(f.options.length+1));
  renderChoices();
  patchCard(activeId);
  const inputs = document.querySelectorAll('#d-choices-list input');
  if (inputs.length) { inputs[inputs.length-1].focus(); inputs[inputs.length-1].select(); }
}

function removeChoice(idx) {
  const f = fields.find(f=>f.id===activeId);
  if (!f) return;
  f.options.splice(idx,1);
  renderChoices();
  patchCard(activeId);
}

/* ══════════════════════════════════════════════════════════
   SYNC HELPERS
══════════════════════════════════════════════════════════ */
function syncEmpty() {
  document.getElementById('canvas-empty').style.display = fields.length ? 'none' : '';
}
function syncCount() {
  const n = fields.length;
  document.getElementById('field-count').textContent = n+' field'+(n!==1?'s':'');
}

/* ══════════════════════════════════════════════════════════
   SAVE
══════════════════════════════════════════════════════════ */
async function saveForm(publish) {
  const title = document.getElementById('form-title-input').value.trim();
  if (!title)          { showToast('Please enter a form title.','warning'); return; }
  if (!fields.length)  { showToast('Add at least one field.','warning');   return; }

  const clean = fields.map(f=>({
    id:f.id, type:f.type, label:f.label||'',
    placeholder:f.placeholder||'', required:!!f.required,
    helpText:f.helpText||'', options:f.options||[]
  }));
  const data = {
    title,
    description: document.getElementById('form-desc-input').value.trim(),
    fields: clean,
    published: publish
  };
  try {
    if (editingFormId) {
      await FS.updateForm(editingFormId, data);
    } else {
      const id = await FS.createForm(data);
      editingFormId = id;
      history.replaceState(null,'',`?id=${id}`);
    }
    showToast(publish ? '✅ Form published!' : '💾 Draft saved!','success');
  } catch(e) {
    showToast('Save failed: '+e.message,'danger');
  }
}

/* ══════════════════════════════════════════════════════════
   PREVIEW
══════════════════════════════════════════════════════════ */
function previewForm() {
  const title = document.getElementById('form-title-input').value.trim() || 'Untitled Form';
  const desc  = document.getElementById('form-desc-input').value.trim();
  document.getElementById('preview-body').innerHTML = `
    <div style="background:linear-gradient(135deg,#2563eb,#06b6d4);padding:28px 32px;color:#fff">
      <h4 style="margin:0;font-weight:700">${esc(title)}</h4>
      ${desc?`<p style="margin:8px 0 0;opacity:.85;font-size:14px">${esc(desc)}</p>`:''}
    </div>
    <div style="padding:24px 32px">
      ${fields.map(f=>`
        <div class="mb-4">
          <label class="form-label fw-600">${esc(f.label)}${f.required?'<span class="text-danger ms-1">*</span>':''}</label>
          ${mkPreview(f).replace(/ disabled/g,'')}
          ${f.helpText?`<div class="form-text">${esc(f.helpText)}</div>`:''}
        </div>`).join('')}
      <button class="btn btn-primary w-100 py-2 mt-2" disabled>Submit Response</button>
    </div>`;
  new bootstrap.Modal(document.getElementById('preview-modal')).show();
}

/* Close drawer with Escape key */
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });
</script>
