<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Builder — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .builder-layout { display:grid; grid-template-columns:220px 1fr 300px; gap:16px; height:calc(100vh - 130px); }
    @media(max-width:1199px){ .builder-layout{ grid-template-columns:1fr; height:auto; } .builder-props{ display:none; } }
    .form-canvas { min-height:200px; }
    .option-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>

    <div class="page-content pt-3">

      <!-- Builder Toolbar -->
      <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
        <input type="text" id="form-title-input" class="form-control" placeholder="Untitled Form" style="max-width:320px;font-weight:600;font-size:15px">
        <input type="text" id="form-desc-input" class="form-control" placeholder="Form description (optional)" style="max-width:300px;font-size:13px">
        <div class="ms-auto d-flex gap-2 flex-wrap">
          <button class="btn btn-light btn-sm" onclick="previewForm()"><i class="bi bi-eye me-1"></i>Preview</button>
          <button class="btn btn-outline-primary btn-sm" onclick="saveForm(false)"><i class="bi bi-floppy me-1"></i>Save Draft</button>
          <button class="btn btn-success btn-sm" onclick="saveForm(true)"><i class="bi bi-globe2 me-1"></i>Publish</button>
        </div>
      </div>

      <!-- Builder 3-column layout -->
      <div class="builder-layout">

        <!-- Left: Field palette -->
        <div class="builder-panel">
          <div class="builder-panel-header"><i class="bi bi-grid-3x3-gap-fill"></i> Fields</div>
          <div class="builder-panel-body">
            <div id="field-palette">
              <!-- Generated by JS -->
            </div>
          </div>
        </div>

        <!-- Center: Canvas -->
        <div class="builder-panel">
          <div class="builder-panel-header d-flex align-items-center">
            <i class="bi bi-layout-text-window-reverse"></i>
            <span class="ms-1">Form Canvas</span>
            <span class="badge bg-primary-light text-primary ms-auto" style="font-size:11px" id="field-count">0 fields</span>
          </div>
          <div class="builder-panel-body">
            <div id="form-canvas" class="form-canvas">
              <div id="canvas-empty" class="form-canvas-empty">
                <i class="bi bi-plus-circle" style="font-size:2rem;opacity:.3;display:block;margin-bottom:12px"></i>
                <div style="font-weight:600;margin-bottom:4px">Drop fields here</div>
                <div style="font-size:12px">Drag fields from the left panel or click to add them</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Properties -->
        <div class="builder-panel builder-props" id="props-panel">
          <div class="builder-panel-header"><i class="bi bi-sliders"></i> Properties</div>
          <div class="builder-panel-body" id="props-body">
            <div class="empty-state" style="padding:40px 16px">
              <i class="bi bi-cursor-fill" style="font-size:2rem"></i>
              <h6 class="mt-2">Select a field</h6>
              <p style="font-size:12px">Click on a field in the canvas to edit its properties.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal fade" id="preview-modal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-eye me-2"></i>Form Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0" id="preview-body"></div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/rbac.js"></script>
<script src="js/firestore.js"></script>
<script src="components/shell.js"></script>

<script>
initTheme();

// ── Field type definitions ──────────────────────────────────
const FIELD_TYPES = [
  { type:"text",      label:"Short Text",   icon:"bi-input-cursor-text",  previewTag:"input" },
  { type:"textarea",  label:"Long Text",    icon:"bi-text-paragraph",     previewTag:"textarea" },
  { type:"number",    label:"Number",       icon:"bi-123",                previewTag:"input" },
  { type:"email",     label:"Email",        icon:"bi-envelope",           previewTag:"input" },
  { type:"phone",     label:"Phone",        icon:"bi-telephone",          previewTag:"input" },
  { type:"dropdown",  label:"Dropdown",     icon:"bi-menu-button-wide",   previewTag:"select" },
  { type:"radio",     label:"Radio Buttons",icon:"bi-ui-radios",          previewTag:"radio" },
  { type:"checkbox",  label:"Checkboxes",   icon:"bi-check2-square",      previewTag:"checkbox" },
  { type:"date",      label:"Date",         icon:"bi-calendar-event",     previewTag:"input" },
  { type:"file",      label:"File Upload",  icon:"bi-cloud-upload",       previewTag:"file" },
];

// Form state
let formFields   = [];   // array of field objects
let selectedId   = null; // currently selected field id
let editingFormId = null; // if editing existing form

// ── Initialize ──────────────────────────────────────────────
Auth.requireAdmin(async (user, profile) => {
  const { sidebarHTML, topbarHTML } = renderShell("form-builder");
  document.getElementById("sidebar-mount").innerHTML = sidebarHTML;
  document.getElementById("topbar-mount").innerHTML  = topbarHTML;
  document.getElementById("page-title").textContent  = "Form Builder";
  Auth.populateTopbar(profile);
  updateSidebarUser(profile);

  // Check if editing
  const params = new URLSearchParams(location.search);
  editingFormId = params.get("id");
  if (editingFormId) {
    const form = await FS.getForm(editingFormId);
    if (form) {
      document.getElementById("form-title-input").value = form.title || "";
      document.getElementById("form-desc-input").value  = form.description || "";
      formFields = form.fields || [];
      renderCanvas();
    }
  }

  buildPalette();
  initSortable();
});

function updateSidebarUser(p) {
  const a = document.getElementById("sidebar-avatar");
  const n = document.getElementById("sidebar-name");
  const r = document.getElementById("sidebar-role");
  if(a) a.textContent = (p.name||p.email||"?")[0].toUpperCase();
  if(n) n.textContent = p.name||p.email;
  if(r) r.textContent = p.role[0].toUpperCase()+p.role.slice(1);
}

// ── Build palette ───────────────────────────────────────────
function buildPalette() {
  const container = document.getElementById("field-palette");
  container.innerHTML = FIELD_TYPES.map(ft => `
    <div class="field-palette-item" draggable="true"
         data-type="${ft.type}"
         ondragstart="onPaletteDragStart(event)"
         onclick="addFieldFromPalette('${ft.type}')">
      <i class="bi ${ft.icon}"></i>
      <span>${ft.label}</span>
    </div>`).join("");
}

// ── Drag from palette ───────────────────────────────────────
let draggingType = null;
function onPaletteDragStart(e) {
  draggingType = e.currentTarget.dataset.type;
  e.dataTransfer.effectAllowed = "copy";
}

const canvas = document.getElementById("form-canvas");
canvas.addEventListener("dragover", e => { e.preventDefault(); canvas.classList.add("drag-over-active"); });
canvas.addEventListener("dragleave", () => canvas.classList.remove("drag-over-active"));
canvas.addEventListener("drop", e => {
  e.preventDefault();
  canvas.classList.remove("drag-over-active");
  if (draggingType) { addFieldFromPalette(draggingType); draggingType = null; }
});

// ── Add field ───────────────────────────────────────────────
function addFieldFromPalette(type) {
  const ft   = FIELD_TYPES.find(f => f.type === type);
  const id   = "field_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
  const field = {
    id,
    type,
    label:       ft.label,
    placeholder: `Enter ${ft.label.toLowerCase()}…`,
    required:    false,
    helpText:    "",
    options:     ["dropdown","radio","checkbox"].includes(type) ? ["Option 1","Option 2","Option 3"] : []
  };
  formFields.push(field);
  renderCanvas();
  selectField(id);
  updateFieldCount();
}

// ── Render canvas ───────────────────────────────────────────
function renderCanvas() {
  const empty  = document.getElementById("canvas-empty");
  const canvas = document.getElementById("form-canvas");

  // Remove old cards
  canvas.querySelectorAll(".form-field-card").forEach(el => el.remove());

  if (!formFields.length) {
    empty.style.display = "";
    updateFieldCount();
    return;
  }
  empty.style.display = "none";

  formFields.forEach((field, idx) => {
    const card = document.createElement("div");
    card.className = "form-field-card" + (field.id === selectedId ? " selected" : "");
    card.dataset.id = field.id;
    card.onclick = () => selectField(field.id);

    card.innerHTML = `
      <div class="form-field-actions">
        <button class="btn btn-icon btn-sm btn-light" onclick="event.stopPropagation();duplicateField('${field.id}')" title="Duplicate"><i class="bi bi-copy" style="font-size:11px"></i></button>
        <button class="btn btn-icon btn-sm btn-light text-danger" onclick="event.stopPropagation();deleteField('${field.id}')" title="Delete"><i class="bi bi-trash" style="font-size:11px"></i></button>
      </div>
      <div style="padding-left:8px">
        <div class="form-field-label">
          ${escHtml(field.label)}
          ${field.required ? '<span class="text-danger ms-1">*</span>' : ""}
          <span class="form-field-type-badge">${field.type}</span>
        </div>
        <div class="field-preview">${renderFieldPreview(field)}</div>
        ${field.helpText ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">${escHtml(field.helpText)}</div>` : ""}
      </div>`;
    canvas.appendChild(card);
  });

  // Re-init sortable on canvas
  initSortable();
  updateFieldCount();
}

function renderFieldPreview(field) {
  switch(field.type) {
    case "text":
    case "number":
    case "email":
    case "phone":
      return `<input type="${field.type === "phone" ? "tel" : field.type}" class="form-control form-control-sm" placeholder="${escHtml(field.placeholder)}" disabled>`;
    case "textarea":
      return `<textarea class="form-control form-control-sm" rows="2" placeholder="${escHtml(field.placeholder)}" disabled></textarea>`;
    case "date":
      return `<input type="date" class="form-control form-control-sm" disabled>`;
    case "dropdown":
      return `<select class="form-select form-select-sm" disabled><option>${field.options[0] || "Select…"}</option></select>`;
    case "radio":
      return (field.options || []).slice(0,3).map(o => `
        <div class="form-check"><input type="radio" class="form-check-input" disabled>
        <label class="form-check-label" style="font-size:12px">${escHtml(o)}</label></div>`).join("");
    case "checkbox":
      return (field.options || []).slice(0,3).map(o => `
        <div class="form-check"><input type="checkbox" class="form-check-input" disabled>
        <label class="form-check-label" style="font-size:12px">${escHtml(o)}</label></div>`).join("");
    case "file":
      return `<input type="file" class="form-control form-control-sm" disabled>`;
    default:
      return `<input type="text" class="form-control form-control-sm" disabled>`;
  }
}

// ── Sortable reorder ────────────────────────────────────────
let sortableInstance;
function initSortable() {
  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = Sortable.create(canvas, {
    animation: 200,
    handle: ".form-field-card",
    ghostClass: "sortable-ghost",
    chosenClass: "sortable-chosen",
    filter: "button, .form-field-actions",
    preventOnFilter: false,
    onEnd(evt) {
      const id = evt.item.dataset.id;
      const oldIdx = formFields.findIndex(f => f.id === id);
      if (oldIdx === -1) return;
      const [moved] = formFields.splice(oldIdx, 1);
      formFields.splice(evt.newIndex - 1, 0, moved); // -1 for empty div
      renderCanvas();
    }
  });
}

// ── Select field → show properties ──────────────────────────
function selectField(id) {
  selectedId = id;
  renderCanvas();
  const field = formFields.find(f => f.id === id);
  if (!field) return;
  renderProperties(field);
}

function renderProperties(field) {
  const hasOptions = ["dropdown","radio","checkbox"].includes(field.type);
  document.getElementById("props-body").innerHTML = `
    <div class="prop-group">
      <div class="prop-group-title">Label & Placeholder</div>
      <div class="mb-2">
        <label class="form-label">Label</label>
        <input type="text" class="form-control form-control-sm" id="prop-label" value="${escHtml(field.label)}" oninput="updateProp('label',this.value)">
      </div>
      ${!hasOptions && field.type !== "date" && field.type !== "file" ? `
      <div>
        <label class="form-label">Placeholder</label>
        <input type="text" class="form-control form-control-sm" id="prop-placeholder" value="${escHtml(field.placeholder||"")}" oninput="updateProp('placeholder',this.value)">
      </div>` : ""}
    </div>

    <div class="prop-group">
      <div class="prop-group-title">Validation</div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="prop-required" ${field.required?"checked":""} onchange="updateProp('required',this.checked)">
        <label class="form-check-label" for="prop-required" style="font-size:13px">Required field</label>
      </div>
    </div>

    <div class="prop-group">
      <div class="prop-group-title">Help Text</div>
      <input type="text" class="form-control form-control-sm" id="prop-help" value="${escHtml(field.helpText||"")}" placeholder="Helper text shown below field" oninput="updateProp('helpText',this.value)">
    </div>

    ${hasOptions ? `
    <div class="prop-group">
      <div class="prop-group-title">Options <button class="btn btn-sm btn-light ms-2" style="font-size:11px;padding:2px 8px" onclick="addOption()"><i class="bi bi-plus"></i> Add</button></div>
      <div id="options-list">
        ${(field.options||[]).map((opt,i) => `
          <div class="option-row" id="opt-row-${i}">
            <input type="text" class="form-control form-control-sm flex-grow-1" value="${escHtml(opt)}" oninput="updateOption(${i},this.value)">
            <button class="btn btn-icon btn-sm btn-light text-danger" onclick="removeOption(${i})"><i class="bi bi-x" style="font-size:12px"></i></button>
          </div>`).join("")}
      </div>
    </div>` : ""}

    <div class="prop-group">
      <div class="prop-group-title">Actions</div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-light flex-grow-1" onclick="duplicateField('${field.id}')"><i class="bi bi-copy me-1"></i>Duplicate</button>
        <button class="btn btn-sm btn-danger flex-grow-1" onclick="deleteField('${field.id}')"><i class="bi bi-trash me-1"></i>Delete</button>
      </div>
    </div>`;
}

function updateProp(key, value) {
  const field = formFields.find(f => f.id === selectedId);
  if (!field) return;
  field[key] = value;
  renderCanvas();
}

function updateOption(index, value) {
  const field = formFields.find(f => f.id === selectedId);
  if (!field) return;
  field.options[index] = value;
  renderCanvas();
}

function addOption() {
  const field = formFields.find(f => f.id === selectedId);
  if (!field) return;
  field.options.push("New Option");
  renderCanvas();
  renderProperties(field);
}

function removeOption(index) {
  const field = formFields.find(f => f.id === selectedId);
  if (!field) return;
  field.options.splice(index, 1);
  renderCanvas();
  renderProperties(field);
}

function deleteField(id) {
  formFields = formFields.filter(f => f.id !== id);
  if (selectedId === id) {
    selectedId = null;
    document.getElementById("props-body").innerHTML = `<div class="empty-state" style="padding:40px 16px"><i class="bi bi-cursor-fill" style="font-size:2rem"></i><h6 class="mt-2">Select a field</h6></div>`;
  }
  renderCanvas();
}

function duplicateField(id) {
  const field = formFields.find(f => f.id === id);
  if (!field) return;
  const clone = JSON.parse(JSON.stringify(field));
  clone.id = "field_" + Date.now();
  const idx = formFields.findIndex(f => f.id === id);
  formFields.splice(idx + 1, 0, clone);
  renderCanvas();
}

function updateFieldCount() {
  document.getElementById("field-count").textContent = `${formFields.length} field${formFields.length !== 1 ? "s" : ""}`;
}

// ── Save form ────────────────────────────────────────────────
async function saveForm(publish) {
  const title = document.getElementById("form-title-input").value.trim();
  if (!title) { showToast("Please enter a form title.", "warning"); return; }
  if (!formFields.length) { showToast("Add at least one field.", "warning"); return; }

  const cleanFields = formFields.map(({ id, type, label, placeholder, required, helpText, options }) => ({
    id, type, label, placeholder: placeholder || "", required: !!required, helpText: helpText || "",
    options: options || []
  }));

  try {
    const data = {
      title,
      description: document.getElementById("form-desc-input").value.trim(),
      fields: cleanFields,
      published: publish
    };

    if (editingFormId) {
      await FS.updateForm(editingFormId, data);
      showToast(publish ? "Form published!" : "Form saved!", "success");
    } else {
      const id = await FS.createForm(data);
      editingFormId = id;
      history.replaceState(null, "", `?id=${id}`);
      showToast(publish ? `Form published! URL: ${location.origin}/form-view.html?id=${id}` : "Form saved as draft!", "success", publish ? "Published!" : "Saved!");
    }

    if (publish) {
      const url = `${location.origin.replace("file://","https://yoursite.com")}/form-view.html?id=${editingFormId}`;
      document.getElementById("page-title").textContent = `Form Builder · ${url}`;
    }
  } catch (e) {
    showToast("Error saving form: " + e.message, "danger");
  }
}

// ── Preview modal ────────────────────────────────────────────
function previewForm() {
  const title = document.getElementById("form-title-input").value || "Preview";
  const desc  = document.getElementById("form-desc-input").value;
  document.getElementById("preview-body").innerHTML = `
    <div style="background:linear-gradient(135deg,#2563eb,#06b6d4);padding:28px 32px;color:#fff">
      <h4 style="margin:0;font-weight:700">${escHtml(title)}</h4>
      ${desc ? `<p style="margin:8px 0 0;opacity:.85;font-size:13.5px">${escHtml(desc)}</p>` : ""}
    </div>
    <div style="padding:24px 32px">
      ${formFields.map(f => `
        <div class="mb-4">
          <label class="form-label fw-600">${escHtml(f.label)}${f.required?'<span class="text-danger ms-1">*</span>':""}</label>
          ${renderFieldPreview(f)}
          ${f.helpText ? `<div class="form-text">${escHtml(f.helpText)}</div>` : ""}
        </div>`).join("")}
      <button class="btn btn-primary w-100 py-2" disabled>Submit Response</button>
    </div>`;
  new bootstrap.Modal(document.getElementById("preview-modal")).show();
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
