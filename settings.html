<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <h5 class="fw-700 mb-4">Settings</h5>

      <div class="row g-4">

        <!-- Profile Settings -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header"><i class="bi bi-person-circle text-primary"></i><span class="fw-600 ms-2">Profile</span></div>
            <div class="card-body">
              <div class="d-flex align-items-center gap-3 mb-4">
                <div style="width:60px;height:60px;background:linear-gradient(135deg,#2563eb,#06b6d4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700" id="profile-avatar">?</div>
                <div>
                  <h6 class="mb-1 fw-700" id="profile-name">Loading…</h6>
                  <p class="text-muted mb-0" style="font-size:13px" id="profile-email"></p>
                  <span id="profile-role-badge"></span>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Display Name</label>
                <input type="text" class="form-control" id="setting-name" placeholder="Your name">
              </div>
              <button class="btn btn-primary btn-sm" onclick="saveProfile()"><i class="bi bi-floppy me-1"></i>Save Profile</button>
            </div>
          </div>
        </div>

        <!-- App Settings -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header"><i class="bi bi-gear text-primary"></i><span class="fw-600 ms-2">Application</span></div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label">School Name</label>
                <input type="text" class="form-control" id="school-name" placeholder="My School" value="SchoolForm Academy">
              </div>
              <div class="mb-3">
                <label class="form-label">Theme</label>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-light flex-grow-1" onclick="document.documentElement.setAttribute('data-theme','light');localStorage.setItem('sfs-theme','light');updateThemeIcon('light');showToast('Light mode activated','success')">
                    <i class="bi bi-sun me-1"></i>Light
                  </button>
                  <button class="btn btn-sm btn-light flex-grow-1" onclick="document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('sfs-theme','dark');updateThemeIcon('dark');showToast('Dark mode activated','success')">
                    <i class="bi bi-moon me-1"></i>Dark
                  </button>
                </div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="showToast('Settings saved!','success')"><i class="bi bi-floppy me-1"></i>Save Settings</button>
            </div>
          </div>
        </div>

        <!-- Data & Backup -->
        <div class="col-lg-6" data-require-role="admin">
          <div class="card">
            <div class="card-header"><i class="bi bi-database text-success"></i><span class="fw-600 ms-2">Data & Backup</span></div>
            <div class="card-body">
              <p class="text-muted" style="font-size:13.5px">Export all system data as a backup JSON file.</p>
              <div class="d-flex gap-2">
                <button class="btn btn-success btn-sm" onclick="exportBackup()"><i class="bi bi-download me-1"></i>Export Full Backup</button>
                <button class="btn btn-light btn-sm" onclick="loadActivityLog()"><i class="bi bi-activity me-1"></i>Activity Log</button>
              </div>
              <div id="activity-preview" class="mt-3" style="max-height:200px;overflow-y:auto;display:none">
                <div id="activity-content"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="col-lg-6" data-require-role="admin">
          <div class="card" style="border-color:#fca5a5">
            <div class="card-header" style="border-bottom-color:#fca5a5"><i class="bi bi-exclamation-triangle text-danger"></i><span class="fw-600 ms-2 text-danger">Danger Zone</span></div>
            <div class="card-body">
              <p class="text-muted" style="font-size:13.5px">These actions are irreversible. Use with extreme caution.</p>
              <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-outline-danger btn-sm" onclick="confirmClearLogs()"><i class="bi bi-trash me-1"></i>Clear Activity Logs</button>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/rbac.js"></script>
<script src="js/firestore.js"></script>
<script src="components/shell.js"></script>

<script>
initTheme();
let currentProfile = null;

Auth.requireAdmin(async (user, profile) => {
  currentProfile = profile;
  const { sidebarHTML, topbarHTML } = renderShell("settings");
  document.getElementById("sidebar-mount").innerHTML = sidebarHTML;
  document.getElementById("topbar-mount").innerHTML  = topbarHTML;
  document.getElementById("page-title").textContent  = "Settings";
  Auth.populateTopbar(profile);
  updateSidebarUser(profile);
  RBAC.applyRoleUI(profile.role);

  // Populate profile
  document.getElementById("profile-avatar").textContent  = (profile.name||profile.email||"?")[0].toUpperCase();
  document.getElementById("profile-name").textContent    = profile.name || "—";
  document.getElementById("profile-email").textContent   = profile.email || "";
  document.getElementById("profile-role-badge").innerHTML = RBAC.getBadgeHTML(profile.role);
  document.getElementById("setting-name").value = profile.name || "";
});

function updateSidebarUser(p) {
  const a=document.getElementById("sidebar-avatar"),n=document.getElementById("sidebar-name"),r=document.getElementById("sidebar-role");
  if(a) a.textContent=(p.name||p.email||"?")[0].toUpperCase();
  if(n) n.textContent=p.name||p.email;
  if(r) r.textContent=p.role[0].toUpperCase()+p.role.slice(1);
}

async function saveProfile() {
  const name = document.getElementById("setting-name").value.trim();
  if (!name) { showToast("Name cannot be empty.", "warning"); return; }
  try {
    await FS.updateUser(auth.currentUser.uid, { name });
    document.getElementById("profile-name").textContent   = name;
    document.getElementById("profile-avatar").textContent = name[0].toUpperCase();
    Auth.populateTopbar({ ...currentProfile, name });
    showToast("Profile updated!", "success");
  } catch(e) { showToast(e.message, "danger"); }
}

async function exportBackup() {
  try {
    const [forms, users, logs] = await Promise.all([
      FS.getForms(), FS.getUsers(), FS.getActivityLogs(100)
    ]);

    const responsesAll = {};
    for (const f of forms) {
      responsesAll[f.id] = await FS.getResponses(f.id);
    }

    const backup = {
      exportedAt: new Date().toISOString(),
      forms, users,
      responses: responsesAll,
      activityLogs: logs
    };

    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `schoolform-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast("Backup exported!", "success");
  } catch(e) { showToast("Export failed: " + e.message, "danger"); }
}

async function loadActivityLog() {
  const preview = document.getElementById("activity-preview");
  const content = document.getElementById("activity-content");
  preview.style.display = "";
  content.innerHTML = `<div class="loading-spinner"><div class="spinner-border spinner-border-sm text-primary" role="status"></div></div>`;
  try {
    const logs = await FS.getActivityLogs(50);
    if (!logs.length) { content.innerHTML = `<p class="text-muted" style="font-size:13px;padding:12px">No activity yet.</p>`; return; }
    content.innerHTML = logs.map(l => `
      <div class="d-flex gap-2 py-2" style="border-bottom:1px solid var(--border-color);font-size:12.5px">
        <span class="badge bg-secondary" style="font-size:10px;flex-shrink:0;align-self:flex-start">${l.type||"log"}</span>
        <div class="flex-grow-1">${escHtml(l.message)}</div>
        <div style="color:var(--text-muted);white-space:nowrap">${fmtTime(l.timestamp)}</div>
      </div>`).join("");
  } catch(e) { content.innerHTML = `<p class="text-danger p-3">${e.message}</p>`; }
}

async function confirmClearLogs() {
  const ok = await confirmAction("Delete all activity logs? This cannot be undone.", "Clear Logs");
  if (!ok) return;
  try {
    const snap = await db.collection("activityLogs").limit(500).get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    showToast("Activity logs cleared.", "success");
  } catch(e) { showToast(e.message, "danger"); }
}

function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
