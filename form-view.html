<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Form — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 50%, #f0fdf4 100%); min-height:100vh; }
    .progress-bar-form { height:4px; background:linear-gradient(90deg,#2563eb,#06b6d4); border-radius:0 0 4px 4px; transition:width .4s ease; }
    .field-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:18px; margin-bottom:14px; transition:border-color .2s,box-shadow .2s; }
    .field-card:focus-within { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
    .file-upload-area { border:2px dashed #cbd5e1; border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:all .2s; }
    .file-upload-area:hover { border-color:#2563eb; background:#f0f7ff; }
    .file-preview { max-width:100%; max-height:160px; border-radius:8px; margin-top:10px; display:none; }
    .success-wrapper { min-height:60vh; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<!-- Top progress bar -->
<div id="progress-bar" class="progress-bar-form" style="width:0;position:fixed;top:0;left:0;right:0;z-index:9999"></div>

<!-- Loading -->
<div id="loading-state" class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Loading form…</p>
  </div>
</div>

<!-- Error State -->
<div id="error-state" class="d-none" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="text-center p-4">
    <div style="font-size:4rem">😕</div>
    <h3 class="mt-3">Form Not Found</h3>
    <p class="text-muted" id="error-msg">This form doesn't exist or has been unpublished.</p>
  </div>
</div>

<!-- Success State -->
<div id="success-state" class="d-none">
  <div class="success-wrapper">
    <div class="text-center p-4">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#10b981,#34d399);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 32px rgba(16,185,129,.3)">
        <i class="bi bi-check-lg text-white" style="font-size:2rem"></i>
      </div>
      <h2 style="font-weight:700;color:#0f172a">Submitted Successfully!</h2>
      <p class="text-muted mt-2" id="success-msg">Your response has been recorded. Thank you!</p>
      <button class="btn btn-primary mt-3" onclick="resetForm()">Submit Another Response</button>
    </div>
  </div>
</div>

<!-- Form State -->
<div id="form-state" class="d-none" style="padding:40px 16px;min-height:100vh">
  <div style="max-width:640px;margin:0 auto">

    <!-- Form Card -->
    <div class="form-card fade-in">
      <div class="form-card-header">
        <h2 id="form-title">Loading…</h2>
        <p id="form-desc"></p>
      </div>
      <div class="form-card-body">

        <!-- Alert -->
        <div id="form-alert" class="alert d-none mb-4" role="alert"></div>

        <!-- Fields injected here -->
        <div id="fields-container"></div>

        <!-- Submit button -->
        <div class="mt-4">
          <button class="btn btn-primary w-100 py-3" id="submit-btn" onclick="submitForm()" style="font-size:15px;font-weight:600;border-radius:10px;letter-spacing:.01em">
            <i class="bi bi-send me-2"></i>Submit Response
            <span id="submit-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
          </button>
        </div>

        <p style="font-size:12px;color:#94a3b8;text-align:center;margin-top:16px">
          <i class="bi bi-shield-check me-1"></i>Your data is securely stored.
          Powered by <strong>SchoolForm</strong>
        </p>
      </div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firestore.js"></script>

<script>
let currentForm = null;
let fileDataMap  = {};  // fieldId → base64 data

const params = new URLSearchParams(location.search);
const formId = params.get("id");

async function init() {
  if (!formId) { showError("No form ID provided."); return; }
  try {
    const form = await FS.getForm(formId);
    if (!form) { showError("This form could not be found."); return; }
    if (!form.published) { showError("This form is not currently accepting responses."); return; }
    currentForm = form;
    document.title = `${form.title} — SchoolForm`;
    renderForm(form);
    show("form-state");
    hide("loading-state");
    updateProgress();
  } catch (e) {
    showError("Failed to load form: " + e.message);
  }
}

function show(id) { document.getElementById(id).classList.remove("d-none"); }
function hide(id) { document.getElementById(id).classList.add("d-none"); }

function showError(msg) {
  document.getElementById("error-msg").textContent = msg;
  hide("loading-state");
  show("error-state");
}

function renderForm(form) {
  document.getElementById("form-title").textContent = form.title;
  document.getElementById("form-desc").textContent  = form.description || "";
  if (!form.description) document.getElementById("form-desc").style.display = "none";

  const container = document.getElementById("fields-container");
  container.innerHTML = (form.fields || []).map(f => renderField(f)).join("");

  // File upload listeners
  container.querySelectorAll(".file-upload-area").forEach(area => {
    const input  = area.querySelector("input[type=file]");
    const img    = area.querySelector(".file-preview");
    const label  = area.querySelector(".file-label-text");
    const fid    = area.dataset.fieldId;

    area.addEventListener("click", () => input.click());
    area.addEventListener("dragover", e => { e.preventDefault(); area.style.borderColor = "#2563eb"; });
    area.addEventListener("dragleave", () => area.style.borderColor = ""); 
    area.addEventListener("drop", e => { e.preventDefault(); area.style.borderColor = ""; if(e.dataTransfer.files[0]) processFile(fid, e.dataTransfer.files[0], img, label); });
    input.addEventListener("change", e => { if(e.target.files[0]) processFile(fid, e.target.files[0], img, label); });
  });

  // Progress on input
  container.querySelectorAll("input,textarea,select").forEach(el => {
    el.addEventListener("change", updateProgress);
    el.addEventListener("input", updateProgress);
  });
}

function renderField(f) {
  const req  = f.required ? '<span style="color:#ef4444;margin-left:3px">*</span>' : "";
  const help = f.helpText ? `<div style="font-size:12px;color:#64748b;margin-top:4px">${escHtml(f.helpText)}</div>` : "";
  let input  = "";

  switch(f.type) {
    case "text":
      input = `<input type="text" class="form-control" id="f_${f.id}" name="${f.id}" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}>`;
      break;
    case "textarea":
      input = `<textarea class="form-control" id="f_${f.id}" name="${f.id}" rows="3" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}></textarea>`;
      break;
    case "number":
      input = `<input type="number" class="form-control" id="f_${f.id}" name="${f.id}" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}>`;
      break;
    case "email":
      input = `<input type="email" class="form-control" id="f_${f.id}" name="${f.id}" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}>`;
      break;
    case "phone":
      input = `<input type="tel" class="form-control" id="f_${f.id}" name="${f.id}" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}>`;
      break;
    case "date":
      input = `<input type="date" class="form-control" id="f_${f.id}" name="${f.id}" ${f.required?"required":""}>`;
      break;
    case "dropdown":
      input = `<select class="form-select" id="f_${f.id}" name="${f.id}" ${f.required?"required":""}><option value="">Choose…</option>${(f.options||[]).map(o=>`<option>${escHtml(o)}</option>`).join("")}</select>`;
      break;
    case "radio":
      input = (f.options||[]).map(o => `
        <div class="form-check">
          <input class="form-check-input" type="radio" name="${f.id}" value="${escHtml(o)}" id="r_${f.id}_${escHtml(o).replace(/\s/g,"_")}" ${f.required?"required":""}>
          <label class="form-check-label" for="r_${f.id}_${escHtml(o).replace(/\s/g,"_")}">${escHtml(o)}</label>
        </div>`).join("");
      break;
    case "checkbox":
      input = (f.options||[]).map(o => `
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="${f.id}[]" value="${escHtml(o)}" id="c_${f.id}_${escHtml(o).replace(/\s/g,"_")}">
          <label class="form-check-label" for="c_${f.id}_${escHtml(o).replace(/\s/g,"_")}">${escHtml(o)}</label>
        </div>`).join("");
      break;
    case "file":
      input = `
        <div class="file-upload-area" data-field-id="${f.id}">
          <input type="file" class="d-none" id="f_${f.id}" accept="image/*,.pdf,.doc,.docx">
          <i class="bi bi-cloud-upload" style="font-size:1.8rem;color:#94a3b8;display:block;margin-bottom:8px"></i>
          <div class="file-label-text" style="font-size:13px;color:#64748b">Click or drag file here<br><span style="font-size:11px">Images, PDF, DOC (max 5MB)</span></div>
          <img class="file-preview" alt="preview">
        </div>`;
      break;
    default:
      input = `<input type="text" class="form-control" id="f_${f.id}" name="${f.id}" placeholder="${escHtml(f.placeholder||"")}" ${f.required?"required":""}>`;
  }

  return `<div class="field-card public-field" id="wrap_${f.id}">
    <label class="form-label fw-600">${escHtml(f.label)}${req}</label>
    ${input}
    ${help}
  </div>`;
}

function processFile(fieldId, file, imgEl, labelEl) {
  if (file.size > 5 * 1024 * 1024) { alert("File too large. Max 5MB."); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const base64 = e.target.result;
    // Compress images via canvas
    if (file.type.startsWith("image/")) {
      const canvas = document.createElement("canvas");
      const img    = new Image();
      img.onload = () => {
        const MAX = 800;
        let {width: w, height: h} = img;
        if (w > MAX) { h = h * MAX / w; w = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        fileDataMap[fieldId] = canvas.toDataURL("image/jpeg", .7);
        imgEl.src   = fileDataMap[fieldId];
        imgEl.style.display = "block";
        labelEl.textContent = file.name;
      };
      img.src = base64;
    } else {
      fileDataMap[fieldId] = base64;
      labelEl.textContent = file.name;
    }
  };
  reader.readAsDataURL(file);
}

async function submitForm() {
  const form = currentForm;
  if (!form) return;

  // Collect values
  const values = {};
  let   valid  = true;
  const alertEl = document.getElementById("form-alert");

  for (const f of form.fields || []) {
    let value = "";
    const el = document.getElementById("f_" + f.id);

    if (f.type === "checkbox") {
      const checked = document.querySelectorAll(`input[name="${f.id}[]"]:checked`);
      value = Array.from(checked).map(c => c.value);
      if (f.required && !value.length) {
        markInvalid(f.id, "Please select at least one option.");
        valid = false; continue;
      }
    } else if (f.type === "radio") {
      const checked = document.querySelector(`input[name="${f.id}"]:checked`);
      value = checked ? checked.value : "";
      if (f.required && !value) {
        markInvalid(f.id, "Please select an option.");
        valid = false; continue;
      }
    } else if (f.type === "file") {
      value = fileDataMap[f.id] || "";
      if (f.required && !value) {
        markInvalid(f.id, "Please upload a file.");
        valid = false; continue;
      }
    } else {
      value = el ? el.value.trim() : "";
      if (f.required && !value) {
        el && el.classList.add("is-invalid");
        valid = false; continue;
      }
      el && el.classList.remove("is-invalid");
    }

    values[f.id] = { label: f.label, value };
  }

  if (!valid) {
    alertEl.className = "alert alert-danger";
    alertEl.innerHTML = "<i class='bi bi-exclamation-triangle-fill me-2'></i>Please fill in all required fields.";
    alertEl.classList.remove("d-none");
    alertEl.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  alertEl.classList.add("d-none");

  const btn   = document.getElementById("submit-btn");
  const spin  = document.getElementById("submit-spinner");
  btn.disabled = true;
  spin.classList.remove("d-none");

  try {
    await FS.submitResponse(formId, {
      formTitle: form.title,
      fields:    values,
      metadata:  { userAgent: navigator.userAgent, timestamp: new Date().toISOString() }
    });

    hide("form-state");
    show("success-state");
    document.getElementById("success-msg").textContent =
      `Your response to "${form.title}" has been recorded. Thank you!`;
  } catch (e) {
    alertEl.className = "alert alert-danger";
    alertEl.innerHTML = `<i class="bi bi-x-circle-fill me-2"></i>Error submitting: ${e.message}`;
    alertEl.classList.remove("d-none");
  } finally {
    btn.disabled = false;
    spin.classList.add("d-none");
  }
}

function markInvalid(fieldId, msg) {
  const wrap = document.getElementById("wrap_" + fieldId);
  if (!wrap) return;
  wrap.style.borderColor = "#ef4444";
  const hint = wrap.querySelector(".invalid-hint");
  if (!hint) wrap.insertAdjacentHTML("beforeend", `<div class="invalid-hint text-danger" style="font-size:12px;margin-top:4px"><i class="bi bi-x-circle me-1"></i>${msg}</div>`);
}

function updateProgress() {
  if (!currentForm || !currentForm.fields) return;
  const total   = currentForm.fields.filter(f => f.required).length;
  if (!total) { document.getElementById("progress-bar").style.width = "100%"; return; }
  let filled = 0;
  currentForm.fields.filter(f => f.required).forEach(f => {
    if (f.type === "checkbox") {
      if (document.querySelector(`input[name="${f.id}[]"]:checked`)) filled++;
    } else if (f.type === "radio") {
      if (document.querySelector(`input[name="${f.id}"]:checked`)) filled++;
    } else if (f.type === "file") {
      if (fileDataMap[f.id]) filled++;
    } else {
      const el = document.getElementById("f_" + f.id);
      if (el && el.value.trim()) filled++;
    }
  });
  document.getElementById("progress-bar").style.width = Math.round((filled / total) * 100) + "%";
}

function resetForm() {
  fileDataMap = {};
  hide("success-state");
  show("form-state");
  if (currentForm) {
    renderForm(currentForm);
    document.getElementById("progress-bar").style.width = "0";
    document.getElementById("form-alert").classList.add("d-none");
  }
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

init();
</script>
</body>
</html>
