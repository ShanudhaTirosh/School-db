<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Data — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-chip { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border-color);border-radius:20px;font-size:12px;cursor:pointer;background:var(--card-bg);transition:all .2s; }
    .filter-chip:hover,.filter-chip.active { border-color:var(--primary);background:var(--primary-light);color:var(--primary); }
    .response-detail-value img { max-width:120px;max-height:120px;border-radius:8px;border:1px solid var(--border-color); }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <!-- Header -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h5 class="mb-1 fw-700">Student Data</h5>
          <p class="text-muted mb-0" style="font-size:13px">Browse, search and manage all form responses.</p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-light" onclick="exportCSV()"><i class="bi bi-filetype-csv me-1"></i>CSV</button>
          <button class="btn btn-sm btn-light" onclick="exportExcel()"><i class="bi bi-file-earmark-excel me-1"></i>Excel</button>
          <button class="btn btn-sm btn-primary" onclick="loadData()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
        </div>
      </div>

      <!-- Filters bar -->
      <div class="card mb-3">
        <div class="card-body py-3">
          <div class="row g-2 align-items-center">
            <div class="col-md-4">
              <div class="input-group input-group-sm">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" id="search-input" class="form-control" placeholder="Search responses…" oninput="applyFilters()">
              </div>
            </div>
            <div class="col-md-3">
              <select class="form-select form-select-sm" id="form-filter" onchange="applyFilters()">
                <option value="">All Forms</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select form-select-sm" id="date-filter" onchange="applyFilters()">
                <option value="">All Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
              </select>
            </div>
            <div class="col-md-2 text-end">
              <span class="text-muted" style="font-size:12px"><span id="result-count">0</span> results</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="card">
        <div class="card-body p-0">
          <div id="table-container">
            <div class="loading-spinner"><div class="spinner-border text-primary" role="status"></div></div>
          </div>

          <!-- Pagination -->
          <div class="d-flex align-items-center justify-content-between p-3" id="pagination-bar" style="border-top:1px solid var(--border-color);display:none!important">
            <div style="font-size:13px;color:var(--text-muted)">
              Showing <span id="page-start">1</span>–<span id="page-end">10</span> of <span id="page-total">0</span>
            </div>
            <nav><ul class="pagination pagination-sm mb-0" id="pagination-list"></ul></nav>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Response Detail Modal -->
<div class="modal fade" id="detail-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-person-lines-fill me-2"></i>Response Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detail-body"></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="detail-delete-btn"><i class="bi bi-trash me-1"></i>Delete</button>
        <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="edit-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Response</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="edit-body"></div>
      <div class="modal-footer">
        <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="save-edit-btn"><i class="bi bi-floppy me-1"></i>Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/rbac.js"></script>
<script src="js/firestore.js"></script>
<script src="components/shell.js"></script>

<script>
initTheme();
let allResponses   = [];
let filteredData   = [];
let allForms       = [];
let userRole       = "viewer";
let currentPage    = 1;
const PAGE_SIZE    = 15;

Auth.requireAuth(async (user, profile) => {
  userRole = profile.role;
  const { sidebarHTML, topbarHTML } = renderShell("responses");
  document.getElementById("sidebar-mount").innerHTML = sidebarHTML;
  document.getElementById("topbar-mount").innerHTML  = topbarHTML;
  document.getElementById("page-title").textContent  = "Student Data";
  Auth.populateTopbar(profile);
  updateSidebarUser(profile);
  RBAC.applyRoleUI(profile.role);
  await loadData();

  // Pre-filter by formId if given
  const params = new URLSearchParams(location.search);
  const preForm = params.get("formId");
  if (preForm) {
    document.getElementById("form-filter").value = preForm;
    applyFilters();
  }
});

function updateSidebarUser(p) {
  const a=document.getElementById("sidebar-avatar"),n=document.getElementById("sidebar-name"),r=document.getElementById("sidebar-role");
  if(a) a.textContent=(p.name||p.email||"?")[0].toUpperCase();
  if(n) n.textContent=p.name||p.email;
  if(r) r.textContent=p.role[0].toUpperCase()+p.role.slice(1);
}

async function loadData() {
  try {
    [allForms, allResponses] = await Promise.all([FS.getForms(), FS.getAllResponses()]);
    populateFormFilter();
    applyFilters();
  } catch(e) {
    document.getElementById("table-container").innerHTML =
      `<div class="alert alert-danger m-3"><i class="bi bi-x-circle me-2"></i>${e.message}</div>`;
  }
}

function populateFormFilter() {
  const sel = document.getElementById("form-filter");
  sel.innerHTML = '<option value="">All Forms</option>' +
    allForms.map(f => `<option value="${f.id}">${escHtml(f.title)}</option>`).join("");
}

function applyFilters() {
  const q    = (document.getElementById("search-input").value||"").toLowerCase();
  const fid  = document.getElementById("form-filter").value;
  const date = document.getElementById("date-filter").value;

  const now  = new Date(); const ms1Day = 86400000;
  filteredData = allResponses.filter(r => {
    if (fid && r.formId !== fid) return false;
    if (date) {
      const t = r.submittedAt?.toDate ? r.submittedAt.toDate() : new Date(r.metadata?.timestamp || 0);
      if (date === "today" && (now - t) > ms1Day) return false;
      if (date === "week"  && (now - t) > 7 * ms1Day) return false;
      if (date === "month" && (now - t) > 30 * ms1Day) return false;
    }
    if (q) {
      const searchable = JSON.stringify(r.fields||{}).toLowerCase() + (r.formTitle||"").toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });

  currentPage = 1;
  renderTable();
}

function renderTable() {
  const total   = filteredData.length;
  const start   = (currentPage - 1) * PAGE_SIZE;
  const end     = Math.min(start + PAGE_SIZE, total);
  const pageData = filteredData.slice(start, end);

  document.getElementById("result-count").textContent = total;

  if (!total) {
    document.getElementById("table-container").innerHTML = `
      <div class="empty-state">
        <i class="bi bi-inbox"></i>
        <h5>No responses found</h5>
        <p>Try adjusting your filters or share the form link with students.</p>
      </div>`;
    document.getElementById("pagination-bar").style.display = "none";
    return;
  }

  // Build column headers from first response's fields
  const sampleFields = Object.values(pageData[0]?.fields || {}).map(f => f.label);

  let html = `<div class="table-responsive"><table class="table table-hover mb-0">
    <thead>
      <tr>
        <th style="width:40px">#</th>
        <th>Form</th>
        ${sampleFields.slice(0,4).map(l => `<th>${escHtml(l)}</th>`).join("")}
        <th>Submitted</th>
        <th style="width:100px">Actions</th>
      </tr>
    </thead>
    <tbody>
      ${pageData.map((r, idx) => {
        const fieldVals = Object.values(r.fields || {});
        const cells = fieldVals.slice(0,4).map(f => {
          let v = Array.isArray(f.value) ? f.value.join(", ") : String(f.value||"");
          if (v.startsWith("data:image")) v = `<img src="${v}" style="width:32px;height:32px;object-fit:cover;border-radius:4px">`;
          else if (v.startsWith("data:")) v = `<i class="bi bi-file-earmark text-muted"></i> File`;
          else v = escHtml(v.length > 40 ? v.slice(0,40)+"…" : v);
          return `<td>${v}</td>`;
        }).join("");

        return `<tr>
          <td class="text-muted">${start + idx + 1}</td>
          <td><span class="badge bg-primary-light text-primary" style="font-size:11px">${escHtml(r.formTitle||"—")}</span></td>
          ${cells}
          <td style="font-size:12px;color:var(--text-muted)">${fmtDate(r.submittedAt)}</td>
          <td>
            <button class="btn btn-icon btn-sm btn-light me-1" onclick="viewDetail('${r.formId}','${r.id}')" title="View"><i class="bi bi-eye" style="font-size:12px"></i></button>
            ${userRole === "admin" ? `
            <button class="btn btn-icon btn-sm btn-light me-1" onclick="editResponse('${r.formId}','${r.id}')" title="Edit"><i class="bi bi-pencil" style="font-size:12px"></i></button>
            <button class="btn btn-icon btn-sm btn-light text-danger" onclick="deleteResponse('${r.formId}','${r.id}')" title="Delete"><i class="bi bi-trash" style="font-size:12px"></i></button>` : ""}
          </td>
        </tr>`;
      }).join("")}
    </tbody>
  </table></div>`;

  document.getElementById("table-container").innerHTML = html;

  // Pagination
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pagBar = document.getElementById("pagination-bar");
  pagBar.style.display = "";
  document.getElementById("page-start").textContent = start + 1;
  document.getElementById("page-end").textContent   = end;
  document.getElementById("page-total").textContent = total;

  let pages = "";
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== totalPages) {
      if (p === 2 || p === totalPages - 1) pages += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
      continue;
    }
    pages += `<li class="page-item ${p === currentPage ? "active" : ""}">
      <button class="page-link" onclick="goPage(${p})">${p}</button></li>`;
  }
  document.getElementById("pagination-list").innerHTML =
    `<li class="page-item ${currentPage===1?"disabled":""}"><button class="page-link" onclick="goPage(${currentPage-1})"><i class="bi bi-chevron-left" style="font-size:11px"></i></button></li>
     ${pages}
     <li class="page-item ${currentPage===totalPages?"disabled":""}"><button class="page-link" onclick="goPage(${currentPage+1})"><i class="bi bi-chevron-right" style="font-size:11px"></i></button></li>`;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
}

function viewDetail(formId, responseId) {
  const r = allResponses.find(x => x.formId === formId && x.id === responseId);
  if (!r) return;
  const fields = Object.values(r.fields || {});
  let html = `<div class="mb-3"><span class="badge bg-primary-light text-primary">${escHtml(r.formTitle||"")}</span>
    <span class="text-muted ms-2" style="font-size:12px">${fmtTime(r.submittedAt)}</span></div>
    <div class="row g-3">`;
  fields.forEach(f => {
    let val = Array.isArray(f.value) ? f.value.join(", ") : String(f.value||"—");
    let display = "";
    if (val.startsWith("data:image")) {
      display = `<img src="${val}" style="max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border-color)">`;
    } else if (val.startsWith("data:")) {
      display = `<a href="${val}" download class="btn btn-sm btn-light"><i class="bi bi-download me-1"></i>Download File</a>`;
    } else {
      display = `<div style="padding:8px 12px;background:var(--body-bg);border-radius:6px;font-size:13.5px">${escHtml(val)}</div>`;
    }
    html += `<div class="col-md-6 response-detail-value">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px">${escHtml(f.label)}</div>
      ${display}
    </div>`;
  });
  html += "</div>";
  document.getElementById("detail-body").innerHTML = html;

  const delBtn = document.getElementById("detail-delete-btn");
  if (userRole !== "admin") { delBtn.style.display = "none"; } else {
    delBtn.style.display = "";
    delBtn.onclick = async () => { await deleteResponse(formId, responseId); bootstrap.Modal.getInstance(document.getElementById("detail-modal")).hide(); };
  }
  new bootstrap.Modal(document.getElementById("detail-modal")).show();
}

function editResponse(formId, responseId) {
  const r = allResponses.find(x => x.formId === formId && x.id === responseId);
  if (!r) return;
  const fields = Object.values(r.fields || {});
  let html = `<div class="row g-3">`;
  fields.forEach((f, i) => {
    const key = Object.keys(r.fields)[i];
    let val = Array.isArray(f.value) ? f.value.join(", ") : String(f.value||"");
    if (!val.startsWith("data:")) {
      html += `<div class="col-md-6">
        <label class="form-label">${escHtml(f.label)}</label>
        <input type="text" class="form-control form-control-sm" data-key="${escHtml(key)}" data-label="${escHtml(f.label)}" value="${escHtml(val)}">
      </div>`;
    }
  });
  html += "</div>";
  document.getElementById("edit-body").innerHTML = html;
  const modal = new bootstrap.Modal(document.getElementById("edit-modal"));
  modal.show();

  document.getElementById("save-edit-btn").onclick = async () => {
    const updates = {};
    document.querySelectorAll("#edit-body input[data-key]").forEach(inp => {
      updates["fields." + inp.dataset.key + ".value"] = inp.value;
    });
    try {
      await FS.updateResponse(formId, responseId, updates);
      showToast("Response updated.", "success");
      modal.hide();
      await loadData();
    } catch(e) { showToast(e.message, "danger"); }
  };
}

async function deleteResponse(formId, responseId) {
  const ok = await confirmAction("Delete this response permanently?", "Delete Response");
  if (!ok) return;
  try {
    await FS.deleteResponse(formId, responseId);
    showToast("Response deleted.", "success");
    allResponses = allResponses.filter(r => !(r.formId === formId && r.id === responseId));
    applyFilters();
  } catch(e) { showToast(e.message, "danger"); }
}

// ── Export ──────────────────────────────────────────────────
function buildExportRows() {
  const rows = [];
  filteredData.forEach(r => {
    const row = { Form: r.formTitle, "Submitted At": fmtTime(r.submittedAt) };
    Object.values(r.fields || {}).forEach(f => {
      const v = Array.isArray(f.value) ? f.value.join(", ") : String(f.value||"");
      row[f.label] = v.startsWith("data:") ? "[File/Image]" : v;
    });
    rows.push(row);
  });
  return rows;
}

function exportCSV() {
  const rows = buildExportRows();
  if (!rows.length) { showToast("No data to export.", "warning"); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(","), ...rows.map(r => headers.map(h => `"${(r[h]||"").replace(/"/g,'""')}"`).join(","))].join("\n");
  downloadFile("student-data.csv", "data:text/csv;charset=utf-8," + encodeURIComponent(csv));
  showToast("CSV exported!", "success");
}

function exportExcel() {
  const rows = buildExportRows();
  if (!rows.length) { showToast("No data to export.", "warning"); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Student Data");
  XLSX.writeFile(wb, "student-data.xlsx");
  showToast("Excel exported!", "success");
}

function downloadFile(filename, href) {
  const a = document.createElement("a");
  a.href = href; a.download = filename;
  a.click(); a.remove();
}

function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
