<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — SchoolForm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    [data-theme="dark"] .login-card { background: rgba(15,23,42,.92); }
  </style>
</head>
<body>

<div class="login-wrapper">
  <!-- Background blobs -->
  <div class="login-bg-shapes">
    <span></span>
    <span></span>
  </div>

  <div class="login-card fade-in">
    <!-- Logo -->
    <div class="login-logo">
      <i class="bi bi-mortarboard-fill"></i>
    </div>
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">Sign in to SchoolForm Data Platform</p>

    <!-- Alert -->
    <div id="login-alert" class="alert alert-danger mt-4 d-none" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span id="login-alert-msg"></span>
    </div>

    <!-- Form -->
    <form id="login-form" class="mt-4" novalidate>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="login-email" class="form-control" placeholder="admin@school.edu" required autocomplete="email">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="input-group-text" id="toggle-password" style="cursor:pointer;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)">
            <i class="bi bi-eye" id="eye-icon" style="color:#64748b"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-600" id="login-btn" style="border-radius:10px;font-size:15px;letter-spacing:.01em">
        <span id="login-btn-text">Sign In</span>
        <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
      </button>
    </form>

    <!-- Demo accounts -->
    <div class="mt-4 pt-4" style="border-top: 1px solid rgba(255,255,255,.08)">
      <p style="color:#64748b;font-size:12px;text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Demo Accounts</p>
      <div class="d-flex gap-2 flex-wrap justify-content-center">
        <button class="btn btn-sm demo-btn" onclick="fillDemo('admin@school.edu','Admin@123')" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;font-size:12px">
          <i class="bi bi-shield-fill me-1"></i>Admin
        </button>
        <button class="btn btn-sm demo-btn" onclick="fillDemo('staff@school.edu','Staff@123')" style="background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;border-radius:8px;font-size:12px">
          <i class="bi bi-person-badge-fill me-1"></i>Staff
        </button>
        <button class="btn btn-sm demo-btn" onclick="fillDemo('viewer@school.edu','Viewer@123')" style="background:rgba(107,114,128,.15);border:1px solid rgba(107,114,128,.3);color:#9ca3af;border-radius:8px;font-size:12px">
          <i class="bi bi-eye-fill me-1"></i>Viewer
        </button>
      </div>
      <p style="color:#475569;font-size:11px;text-align:center;margin-top:10px">
        Create these accounts in your Firebase Console first.
      </p>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="components/shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  initTheme();

  // Redirect if already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = "dashboard.html";
  });

  // Toggle password visibility
  document.getElementById("toggle-password").addEventListener("click", () => {
    const inp = document.getElementById("login-password");
    const icon = document.getElementById("eye-icon");
    if (inp.type === "password") {
      inp.type = "text";
      icon.className = "bi bi-eye-slash";
    } else {
      inp.type = "password";
      icon.className = "bi bi-eye";
    }
  });

  // Login form submit
  document.getElementById("login-form").addEventListener("submit", async e => {
    e.preventDefault();
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-password").value;
    const btn   = document.getElementById("login-btn");
    const text  = document.getElementById("login-btn-text");
    const spin  = document.getElementById("login-spinner");
    const alert = document.getElementById("login-alert");
    const alertMsg = document.getElementById("login-alert-msg");

    alert.classList.add("d-none");
    btn.disabled = true;
    text.textContent = "Signing in…";
    spin.classList.remove("d-none");

    try {
      await Auth.login(email, pass);
      window.location.href = "dashboard.html";
    } catch (err) {
      let msg = "Invalid email or password.";
      if (err.code === "auth/user-not-found")   msg = "No account found with this email.";
      if (err.code === "auth/wrong-password")   msg = "Incorrect password.";
      if (err.code === "auth/too-many-requests") msg = "Too many attempts. Please try again later.";
      if (err.code === "auth/network-request-failed") msg = "Network error. Check your connection.";
      alertMsg.textContent = msg;
      alert.classList.remove("d-none");
    } finally {
      btn.disabled = false;
      text.textContent = "Sign In";
      spin.classList.add("d-none");
    }
  });

  function fillDemo(email, pass) {
    document.getElementById("login-email").value    = email;
    document.getElementById("login-password").value = pass;
  }
</script>
</body>
</html>
